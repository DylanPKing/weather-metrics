services:
  weather-metrics:
    container_name: weather-metrics
    build: .
    ports:
      - "8000:8000"
    environment:
      - UV_NO_DEV=0
    user: root
    volumes:
      - .:/app

  postgres:
    container_name: weather-metrics-psql
    image: postgres:15
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
